version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spincylinder-z2 -o lat
    outputs:
      lattice: lat

  parity_neel4:
    from: lat
    run: mp-construct -l lat -o psi 0.5s:0.5a:0.5s:0.5a
    outputs:
      state: psi
    certify:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{state}"
          approx: 0.0
          abs: 1e-12

tests:
  lattice_info_reports_the_default_yc4_z2_cylinder_geometry:
    use: lat
    expect:
      - lattice_info_text:
          contains: "Description: Z_2 spin cylinder"
      - lattice_info_text:
          contains: "SymmetryList: Z:Z2"
      - lattice_info_text:
          contains: "Unit cell size: 4"
      - lattice_info_text:
          contains: "H_J2       - next-nearest neighbor spin exchange H_J2d + H_J2a"

  z2_cylinder_product_state_supports_exact_identity_moments:
    use: parity_neel4
    expect:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - imoments_real:
          operator: "lat:sum_unit(I(0))"
          power: 1
          moment: 1
          degree: 1
          approx: 1.0
          abs: 1e-12
