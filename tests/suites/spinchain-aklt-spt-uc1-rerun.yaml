version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

# The post-expansion mp-idmrg path converges this AKLT check reliably and
# replaces the older S3E-based regression path for this model.

fixtures:
  lat:
    run: spinchain -S 1 -o lat
    outputs:
      lattice: lat

  aklt_ground_uc1_rerun:
    from: lat
    steps:
      - run: mp-idmrg -e -b -u 1 -w psi -H lat:H_AKLT -m 8x32 --seed 1 --post rsvd
        outputs:
          state: psi
      - run: mp-idmrg -w psi -H lat:H_AKLT -m 8x32 --post rsvd
    certify:
      - attr_text:
          attribute: Hamiltonian
          equals: "lat:H_AKLT"
      - attr_float:
          attribute: LastEnergy
          approx: -0.666666666666667
          abs: 1e-5
      - info_text:
          contains: "Unit cell size = 1"
      - aux_algebra_commutator_real:
          operator1: X
          operator2: X
          approx: 1.0
          abs: 1e-5
      - aux_algebra_commutator_imag:
          operator1: X
          operator2: X
          approx: 0.0
          abs: 1e-5
      - aux_algebra_commutator_real:
          operator1: X
          operator2: Z
          approx: -1.0
          abs: 1e-5
      - aux_algebra_commutator_imag:
          operator1: X
          operator2: Z
          approx: 0.0
          abs: 1e-5
      - aux_algebra_commutator_real:
          operator1: X
          operator2: Y
          approx: -1.0
          abs: 1e-5
      - aux_algebra_commutator_imag:
          operator1: X
          operator2: Y
          approx: 0.0
          abs: 1e-5
      - aux_algebra_commutator_real:
          operator1: Y
          operator2: Z
          approx: -1.0
          abs: 1e-5
      - aux_algebra_commutator_imag:
          operator1: Y
          operator2: Z
          approx: 0.0
          abs: 1e-5

tests:
  rerunning_single_site_aklt_dmrg_preserves_exact_energy_and_spt_projective_phase:
    use: aklt_ground_uc1_rerun
    expect:
      - attr_float:
          attribute: LastEnergy
          approx: -0.666666666666667
          abs: 1e-5
      - aux_algebra_commutator_real:
          operator1: X
          operator2: Z
          approx: -1.0
          abs: 1e-5
      - aux_algebra_commutator_imag:
          operator1: X
          operator2: Z
          approx: 0.0
          abs: 1e-5
