version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinchain-u1 -o lat
    outputs:
      lattice: lat

  infinite_neel2:
    from: lat
    run: mp-construct -l lat -o psi 0.5:-0.5
    outputs:
      state: psi
    certify:
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: -0.5
          abs: 1e-12

  ibc_neel2:
    from: infinite_neel2
    run: mp-ibc-create psi -o ibc --boundary-lambda
    outputs:
      state: ibc
    certify:
      - ibc_overlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - ibc_overlap_imag:
          psi2: "{state}"
          approx: 0.0
          abs: 1e-12
      - ibc_overlap_mag:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12

  ibc_neel2_window_sz0:
    from: ibc_neel2
    run: mp-ibc-apply --window "lat:Sz(0)" ibc ibc_sz0
    outputs:
      state: ibc_sz0
    certify:
      - ibc_overlap_real:
          psi2: "{parent.state}"
          approx: 0.5
          abs: 1e-12
      - ibc_overlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12

  ibc_neel2_window_szsum:
    from: ibc_neel2
    run: mp-ibc-apply --window "lat:Sz(0)+Sz(1)" ibc ibc_szsum
    outputs:
      state: ibc_szsum
    certify:
      - ibc_overlap_real:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12
      - ibc_overlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12

tests:
  ibc_create_preserves_the_background_state:
    use:
      psi1: ibc_neel2.state
      psi2: ibc_neel2.state
    expect:
      - ibc_overlap_real:
          approx: 1.0
          abs: 1e-12
      - ibc_overlap_imag:
          approx: 0.0
          abs: 1e-12
      - ibc_overlap_mag:
          approx: 1.0
          abs: 1e-12

  ibc_window_overlap_matches_local_sz_expectation:
    use:
      psi1: ibc_neel2.state
      psi2: ibc_neel2_window_sz0.state
    expect:
      - ibc_overlap_real:
          approx: 0.5
          abs: 1e-12
      - ibc_overlap_imag:
          approx: 0.0
          abs: 1e-12

  ibc_window_overlap_matches_two_site_sz_sum_expectation:
    use:
      psi1: ibc_neel2.state
      psi2: ibc_neel2_window_szsum.state
    expect:
      - ibc_overlap_real:
          approx: 0.0
          abs: 1e-12
      - ibc_overlap_imag:
          approx: 0.0
          abs: 1e-12
