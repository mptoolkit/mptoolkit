version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: bosehubbard -o lat
    outputs:
      lattice: lat

  vacuum:
    from: lat
    run: mp-construct -l lat -o psi 0
    outputs:
      state: psi
    certify:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{state}"
          approx: 0.0
          abs: 1e-12

tests:
  lattice_info_reports_the_plain_bose_hubbard_model:
    use: lat
    expect:
      - lattice_info_text:
          contains: "Description: Bose-Hubbard model (no symmetry)"
      - lattice_info_text:
          contains: "SymmetryList: Null:Null"
      - lattice_info_text:
          contains: "H_mu       - chemical potential = -sum_unit(N(0))"

  plain_bose_hubbard_vacuum_supports_exact_identity_moments:
    use: vacuum
    expect:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - imoments_real:
          operator: "lat:sum_unit(I(0))"
          power: 1
          moment: 1
          degree: 1
          approx: 1.0
          abs: 1e-12
