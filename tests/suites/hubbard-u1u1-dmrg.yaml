version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: hubbard-u1u1 -o lat
    outputs:
      lattice: lat

  up_empty_2:
    from: lat
    run: mp-construct -l lat -o psi --finite up:empty
    outputs:
      state: psi
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Nup(0)"
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Nup(1)"
          approx: 0.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Ndown(0)"
          approx: 0.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Ndown(1)"
          approx: 0.0
          abs: 1e-12

  ground2_up:
    from: up_empty_2
    run: mp-dmrg -w psi -H lat:H_tup -m 10x4 --flush
    certify:
      - attr_float:
          attribute: LastEnergy
          approx: -1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Nup(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Nup(1)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Ndown(0)"
          approx: 0.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Ndown(1)"
          approx: 0.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:dot(CHup(0), Cup(1))"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:dot(Cup(0), CHup(1))"
          approx: -0.5
          abs: 1e-12

tests:
  finite_one_up_product_state_has_expected_occupancy:
    use: up_empty_2
    expect:
      - expectation_real:
          operator: "lat:Nup(0)"
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Nup(1)"
          approx: 0.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Ndown(0)"
          approx: 0.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Ndown(1)"
          approx: 0.0
          abs: 1e-12

  one_up_hubbard_ground_state_has_expected_energy_density_and_fermion_signs:
    use: ground2_up
    expect:
      - attr_float:
          attribute: LastEnergy
          approx: -1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Nup(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Nup(1)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Ndown(0)"
          approx: 0.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Ndown(1)"
          approx: 0.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:dot(CHup(0), Cup(1))"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:dot(Cup(0), CHup(1))"
          approx: -0.5
          abs: 1e-12
