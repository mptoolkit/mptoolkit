version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: hubbard-u1su2 -o lat
    outputs:
      lattice: lat

  single_empty_2:
    from: lat
    run: mp-construct -l lat -o psi --finite single:empty
    outputs:
      state: psi

  ground2_single:
    from: single_empty_2
    run: mp-dmrg -w psi -H lat:H_t -m 10x4 --flush
    certify:
      - attr_float:
          attribute: LastEnergy
          approx: -1.0
          abs: 1e-12
      - norm:
          approx: 2.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:N(0)"
          approx: 2.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:N(1)"
          approx: 2.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:dot(CH(0), C(1))"
          approx: 2.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:dot(C(0), CH(1))"
          approx: 2.0
          abs: 1e-11

tests:
  reduced_spin_one_particle_ground_state_has_expected_energy_and_hopping:
    use: ground2_single
    expect:
      - attr_float:
          attribute: LastEnergy
          approx: -1.0
          abs: 1e-12
      - norm:
          approx: 2.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:N(0)"
          approx: 2.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:N(1)"
          approx: 2.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:dot(CH(0), C(1))"
          approx: 2.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:dot(C(0), CH(1))"
          approx: 2.0
          abs: 1e-11
