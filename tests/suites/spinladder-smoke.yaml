version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinladder -o lat
    outputs:
      lattice: lat

  neel2:
    from: lat
    run: mp-construct -l lat -o psi 0.5:-0.5
    outputs:
      state: psi
    certify:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{state}"
          approx: 0.0
          abs: 1e-12

tests:
  lattice_info_reports_the_default_plain_two_leg_ladder_geometry:
    use: lat
    expect:
      - lattice_info_text:
          contains: "Description: spin ladder"
      - lattice_info_text:
          contains: "Unit cell size: 2"
      - lattice_info_text:
          contains: "H_J1_y     - nearest neighbor spin exchange in the y (rung) direction"

  plain_ladder_product_state_supports_exact_identity_moments:
    use: neel2
    expect:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - imoments_real:
          operator: "lat:sum_unit(I(0))"
          power: 1
          moment: 1
          degree: 1
          approx: 1.0
          abs: 1e-12
