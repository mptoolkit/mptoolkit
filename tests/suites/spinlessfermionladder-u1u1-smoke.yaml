version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinlessfermionladder-u1u1 -o lat
    outputs:
      lattice: lat

  leg_product_10:
    from: lat
    run: mp-construct -l lat -o psi single:empty
    outputs:
      state: psi
    certify:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12

tests:
  lattice_info_reports_the_spinless_fermion_ladder_symmetry_and_geometry:
    use: lat
    expect:
      - lattice_info_text:
          contains: "Description: Spinless fermion ladder U(1)xU(1) symmetry"
      - lattice_info_text:
          contains: "SymmetryList: N1:U(1),N2:U(1)"
      - lattice_info_text:
          contains: "Unit cell size: 2"

  ladder_product_state_supports_exact_identity_moments:
    use: leg_product_10
    expect:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{state}"
          approx: 0.0
          abs: 1e-12
      - imoments_real:
          operator: "lat:sum_unit(I(0))"
          power: 1
          moment: 1
          degree: 1
          approx: 1.0
          abs: 1e-12
