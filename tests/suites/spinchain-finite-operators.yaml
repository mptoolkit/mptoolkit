version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinchain-u1 -o lat
    outputs:
      lattice: lat

  neel4:
    from: lat
    run: mp-construct -l lat -o psi --finite 0.5:-0.5:0.5:-0.5
    outputs:
      state: psi
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12

  neel4_identity:
    from: neel4
    run: mp-apply lat:I(0) psi psi_id
    outputs:
      state: psi_id
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12
      - overlap_real:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12
      - overlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12

  neel4_sz:
    from: neel4
    run: mp-apply lat:Sz(0) psi psi_sz
    outputs:
      state: psi_sz
    certify:
      - norm:
          approx: 0.5
          abs: 1e-12
      - overlap_real:
          psi2: "{parent.state}"
          approx: 0.5
          abs: 1e-12
      - overlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12

  neel4_phase:
    from: neel4
    run: mp-apply --assume-orthogonal lat:exp(i*pi*Sz(0)) psi psi_phase
    outputs:
      state: psi_phase
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12
      - overlap_real:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12
      - overlap_imag:
          psi2: "{parent.state}"
          approx: -1.0
          abs: 1e-12
      - overlap_mag:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12

tests:
  lattice_info_reports_spinchain_u1_symmetry_and_hamiltonian:
    use: lat
    expect:
      - lattice_info_text:
          contains: "SymmetryList: Sz:U(1)"
      - lattice_info_text:
          contains: "Unit cell size: 1"
      - lattice_info_text:
          contains: "H_J1       - nearest neighbor spin exchange = H_J1z + H_J1t"

  show_operator_parses_finite_unit_cell_form:
    use: lat
    expect:
      - show_finite_operator_text:
          operator: "lat:Sz(0)"
          contains: "Finite Operator lat:Sz(0)"
      - show_finite_operator_text:
          operator: "lat:Sz(0)"
          contains: "BasicFiniteMPO has 1 sites"
      - show_finite_operator_text:
          operator: "lat:Sz(0)"
          contains: "[s]"

  show_operator_parses_product_form:
    use: lat
    expect:
      - show_product_operator_text:
          operator: "lat:prod_unit(I(0))"
          contains: "Product Operator lat:prod_unit(I(0))"
      - show_product_operator_text:
          operator: "lat:prod_unit(I(0))"
          contains: "ProductMPO has 1 sites"
      - show_product_operator_text:
          operator: "lat:prod_unit(I(0))"
          contains: "[I]"

  apply_identity_preserves_the_state:
    use:
      psi1: neel4.state
      psi2: neel4_identity.state
    expect:
      - overlap_real:
          approx: 1.0
          abs: 1e-12
      - overlap_imag:
          approx: 0.0
          abs: 1e-12
      - overlap_mag:
          approx: 1.0
          abs: 1e-12

  apply_local_sz_returns_expected_amplitude:
    use:
      psi1: neel4.state
      psi2: neel4_sz.state
    expect:
      - overlap_real:
          approx: 0.5
          abs: 1e-12
      - overlap_imag:
          approx: 0.0
          abs: 1e-12
      - overlap_mag:
          approx: 0.5
          abs: 1e-12

  apply_phase_operator_matches_expected_complex_overlap:
    use:
      psi1: neel4.state
      psi2: neel4_phase.state
    expect:
      - overlap_real:
          approx: 0.0
          abs: 1e-12
      - overlap_imag:
          approx: 1.0
          abs: 1e-12
      - overlap_mag:
          approx: 1.0
          abs: 1e-12
