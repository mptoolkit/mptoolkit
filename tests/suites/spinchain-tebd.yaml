          approx: 0.5
          abs: 1e-12

  infinite_upup3_itebd_sites3_identity:
    from: infinite_upup3
    run: mp-itebd -w psi -H "lat:sum_unit(sites=3,I(0))" -o out -t 0.1 -n 1 -s 1
    outputs:
      state:
        glob: out*
        select: newest
    certify:
      - attr_float:
          attribute: Time
          approx: 0.1
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(2)"
          approx: 0.5
          abs: 1e-12

  infinite_upup4:
    from: lat_plain
    run: mp-construct -l lat -o psi 0.5:0.5:0.5:0.5
    outputs:
      state: psi
    certify:
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(2)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(3)"
          approx: 0.5
          abs: 1e-12

  infinite_upup4_itebd_site3_sx:
    from: infinite_upup4
    run: mp-itebd -w psi -H "lat:sum_unit(sites=4,Sx(3))" -o out -t 0.1 -n 1 -s 1
