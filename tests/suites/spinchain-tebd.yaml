  infinite_upup4_itdvp_site3_sx:
    from: infinite_upup4
    run: mp-itdvp -w psi -H "lat:sum_unit(sites=4,Sx(3))" -o out -t 0.1 -n 1 -s 1 -m 4
    outputs:
