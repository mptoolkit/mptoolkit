          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: 0.49750208263901
          abs: 1e-12

  infinite_upup2_itdvp_site1_sx:
    from: infinite_upup2
    run: mp-itdvp -w psi -H "lat:sum_unit(sites=2,Sx(1))" -o out -t 0.1 -n 1 -s 1 -m 4
