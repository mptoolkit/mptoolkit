  infinite_upup4_itebd_sites4_identity_imag_parallel:
    from: infinite_upup4
    env:
      OMP_NUM_THREADS: "4"
    run: mp-itebd -w psi -H "lat:sum_unit(sites=4,I(0))" -o out -t 0-0.1i -n 1 -s 1
    outputs:
      state:
        glob: out*
        select: newest
    certify:
      - attr_float:
          attribute: Beta
          approx: 0.1
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(2)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(3)"
          approx: 0.5
          abs: 1e-12
      - ioverlap_real:
          psi2: "{parent.state}"
          approx: 0.90483741803596
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{parent.state}"
          approx: 0.90483741803596
          abs: 1e-12

tests:
  tebd_identity_updates_norm_and_beta:
    use: finite_neel4_tebd_identity
    expect:
      - norm:
          approx: 0.67032004603564
          abs: 1e-12
      - attr_text:
          attribute: EvolutionHamiltonian
          equals: "lat:sum_unit(I(0))"

  itebd_identity_updates_beta_and_operator:
    use: infinite_neel2_itebd_identity
    expect:
      - attr_float:
          attribute: Beta
          approx: 0.1
          abs: 1e-12
      - attr_text:
          attribute: EvolutionHamiltonian
          equals: "lat:sum_unit(I(0))"
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
