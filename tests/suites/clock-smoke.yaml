version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  clock_lat:
    run: clock -q 3 -o lat
    outputs:
      lattice: lat

  clock_zn_lat:
    run: clock-zn -q 3 -o lat
    outputs:
      lattice: lat

tests:
  clock_model_reports_expected_operators:
    use: clock_lat
    expect:
      - lattice_info_text:
          contains: "Description: q-state clock model"
      - lattice_info_text:
          contains: "SymmetryList: S:Null"
      - lattice_info_text:
          contains: "OmegaD     - adjoint of Omega (alias ZD)"
      - lattice_info_text:
          contains: "GammaD     - adjoint of Gamma (alias XD)"
      - lattice_info_text:
          contains: "H_J        - nearest neighbor coupling -sum_i (Omega_i OmegaD_{i+1} + OmegaD_i Omega_{i+1})"
      - lattice_info_text:
          contains: "H_g        - transverse field -sum_i (Gamma_i + GammaD_i)"

  clock_zn_model_reports_expected_symmetry_and_operators:
    use: clock_zn_lat
    expect:
      - lattice_info_text:
          contains: "Description: q-state clock model with Z_q symmetry"
      - lattice_info_text:
          contains: "SymmetryList: Q:Z_3"
      - lattice_info_text:
          contains: "OmegaD     - charge -1 adjoint of Omega (alias ZD)"
      - lattice_info_text:
          contains: "GammaD     - neutral adjoint of Gamma (alias XD)"
      - lattice_info_text:
          contains: "H_J        - nearest neighbor coupling -sum_i (Omega_i OmegaD_{i+1} + OmegaD_i Omega_{i+1})"
      - lattice_info_text:
          contains: "H_g        - transverse field -sum_i (Gamma_i + GammaD_i)"
