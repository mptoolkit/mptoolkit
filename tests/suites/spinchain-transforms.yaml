version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinchain-u1 -o lat
    outputs:
      lattice: lat

  neel4:
    from: lat
    run: mp-construct -l lat -o psi --finite 0.5:-0.5:0.5:-0.5
    outputs:
      state: psi
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12

  neel4_scaled3:
    from: neel4
    run: mp-scale psi 3
    certify:
      - norm:
          approx: 3.0
          abs: 1e-12

  neel4_scaled3_normalized:
    from: neel4_scaled3
    run: mp-normalize psi
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12

  neel4_scaled_i:
    from: neel4
    run: mp-scale psi 0+1i
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12

  neel4_scaled_3plus4i:
    from: neel4
    run: mp-scale psi 3+4i
    certify:
      - norm:
          approx: 5.0
          abs: 1e-12

  neel4_scaled_i_conj:
    from: neel4_scaled_i
    run: mp-conj psi psi_conj
    outputs:
      state: psi_conj
    certify:
      - overlap_real:
          psi2: "{parent.state}"
          approx: -1.0
          abs: 1e-12
      - overlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12

tests:
  overlap_self_of_real_product_state_is_one:
    use: neel4
    expect:
      - overlap_real:
          approx: 1.0
          abs: 1e-12
      - overlap_imag:
          approx: 0.0
          abs: 1e-12
      - overlap_mag:
          approx: 1.0
          abs: 1e-12

  scale_updates_the_wavefunction_norm:
    use: neel4_scaled3
    expect:
      - norm:
          approx: 3.0
          abs: 1e-12
      - overlap_mag:
          approx: 9.0
          abs: 1e-12

  normalize_restores_unit_norm_after_scaling:
    use: neel4_scaled3_normalized
    expect:
      - norm:
          approx: 1.0
          abs: 1e-12
      - overlap_mag:
          approx: 1.0
          abs: 1e-12

  complex_scale_preserves_phase_relative_to_original:
    use:
      psi1: neel4.state
      psi2: neel4_scaled_3plus4i.state
    expect:
      - overlap_real:
          approx: 3.0
          abs: 1e-12
      - overlap_imag:
          approx: 4.0
          abs: 1e-12
      - overlap_mag:
          approx: 5.0
          abs: 1e-12

  conjugated_complex_state_has_expected_overlap:
    use:
      psi1: neel4_scaled_i.state
      psi2: neel4_scaled_i_conj.state
    expect:
      - overlap_real:
          approx: -1.0
          abs: 1e-12
      - overlap_imag:
          approx: 0.0
          abs: 1e-12
      - overlap_mag:
          approx: 1.0
          abs: 1e-12
