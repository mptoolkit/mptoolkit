version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinchain-u1 -o lat
    outputs:
      lattice: lat

  infinite_neel2:
    from: lat
    run: mp-construct -l lat -o psi 0.5:-0.5
    outputs:
      state: psi
    certify:
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: -0.5
          abs: 1e-12

  infinite_neel2_sign:
    from: infinite_neel2
    run: mp-iapply "lat:prod_unit(2*Sz(1))" psi psi_sign
    outputs:
      state: psi_sign
    certify:
      - ioverlap_real:
          psi2: "{parent.state}"
          approx: -1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12
      - iexpectation_cross_real:
          psi1: "{parent.state}"
          psi2: "{state}"
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - iexpectation_cross_imag:
          psi1: "{parent.state}"
          psi2: "{state}"
          operator: "lat:Sz(0)"
          approx: 0.0
          abs: 1e-12

tests:
  iexpectation_cross_matches_the_self_expectation:
    use:
      psi1: infinite_neel2.state
      psi2: infinite_neel2.state
    expect:
      - iexpectation_cross_real:
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - iexpectation_cross_imag:
          operator: "lat:Sz(0)"
          approx: 0.0
          abs: 1e-12
