version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinchain-u1 -o lat
    outputs:
      lattice: lat

  infinite_spinchain_hstag_ground:
    from: lat
    run: mp-idmrg -e -b -u 2 -q 0 -w psi -H lat:H_stag -m 4x2 --seed 1
    outputs:
      state: psi
    certify:
      - attr_text:
          attribute: Hamiltonian
          equals: "lat:H_stag"
      - attr_float:
          attribute: LastEnergy
          approx: -1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: -0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: 0.5
          abs: 1e-12
      - info_text:
          contains: "Unit cell size = 2"
      - info_text:
          contains: "Quantum number per unit cell = 0"

  infinite_spinchain_heisenberg_post_expansion:
    from: lat
    # Smoke test for the post-expansion path. This schedule is intentionally
    # small for CI and is not a convergence benchmark.
    run: mp-idmrg -e -b -u 2 -q 0 -w psi -H lat:H_J1 -m 4x2,8x2 --seed 1 --maxtol 1e-10 --post rsvd
    outputs:
      state: psi
    certify:
      - attr_text:
          attribute: Hamiltonian
          equals: "lat:H_J1"
      - info_text:
          contains: "Unit cell size = 2"
      - info_text:
          contains: "Number of states = 6"

tests:
  idmrg_finds_the_exact_staggered_field_ground_state:
    use: infinite_spinchain_hstag_ground
    expect:
      - attr_text:
          attribute: Hamiltonian
          equals: "lat:H_stag"
      - attr_float:
          attribute: LastEnergy
          approx: -1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: -0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: 0.5

  idmrg_post_expansion_handles_heisenberg_chain:
    use: infinite_spinchain_heisenberg_post_expansion
    expect:
      - attr_text:
          attribute: Hamiltonian
          equals: "lat:H_J1"
      - info_text:
          contains: "Number of states = 6"
