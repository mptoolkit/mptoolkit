version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinchain-z2 -o lat
    outputs:
      lattice: lat

  sx_neel2:
    from: lat
    run: mp-construct -l lat -o psi --finite 0.5s:0.5a
    outputs:
      state: psi
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sx(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sx(1)"
          approx: -0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:X(0)"
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:X(1)"
          approx: -1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sx(0)*Sx(1)"
          approx: -0.25
          abs: 1e-12

tests:
  z2_spin_half_product_state_has_expected_local_sx_and_parity:
    use: sx_neel2
    expect:
      - norm:
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sx(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sx(1)"
          approx: -0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:X(0)"
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:X(1)"
          approx: -1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sx(0)*Sx(1)"
          approx: -0.25
          abs: 1e-12
