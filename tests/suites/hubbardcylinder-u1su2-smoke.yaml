version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: hubbardcylinder-u1su2 -o lat
    outputs:
      lattice: lat

tests:
  lattice_info_reports_the_default_hubbard_cylinder_geometry:
    use: lat
    expect:
      - lattice_info_text:
          contains: "Description: U(1)xSU(2) Fermi Hubbard 2D cylinder square lattice"
      - lattice_info_text:
          contains: "SymmetryList: N:U(1),S:SU(2)"
      - lattice_info_text:
          contains: "Unit cell size: 4"
      - lattice_info_text:
          contains: "H_t        - nearest neighbor hopping"
      - lattice_info_text:
          contains: "H_U        - on-site Coulomb interaction n_up*n_down"
