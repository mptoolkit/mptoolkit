version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinladder-su2 -o lat
    outputs:
      lattice: lat

  rand2_s0:
    from: lat
    run: mp-random -l lat -u 2 -q 0 -o psi -s 1 --quiet
    outputs:
      state: psi

  rung_singlet:
    from: rand2_s0
    run: mp-dmrg -w psi -H lat:H_J1y -m 10x4 --flush
    certify:
      - attr_float:
          attribute: LastEnergy
          approx: -0.75
          abs: 1e-12
      - norm:
          approx: 1.0
          abs: 1e-12

tests:
  lattice_info_reports_the_default_two_leg_su2_ladder_geometry:
    use: lat
    expect:
      - lattice_info_text:
          contains: "Description: SU(2) spin ladder"
      - lattice_info_text:
          contains: "Unit cell size: 2"
      - lattice_info_text:
          contains: "H_J1y      - nearest neighbor spin exchange in the y (rung) direction"

  rung_exchange_ground_state_has_the_exact_two_site_singlet_energy:
    use: rung_singlet
    expect:
      - attr_float:
          attribute: LastEnergy
          approx: -0.75
          abs: 1e-12
      - norm:
          approx: 1.0
          abs: 1e-12
