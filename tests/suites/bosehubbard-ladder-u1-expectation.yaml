version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: bosehubbard-ladder-u1 -o lat
    outputs:
      lattice: lat

  rung_occupancy_01:
    from: lat
    run: mp-construct -l lat -o psi 0:1
    outputs:
      state: psi
    certify:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:D(0)"
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:D(0)*D(0)"
          approx: 1.0
          abs: 1e-12

tests:
  ladder_product_state_has_expected_rung_imbalance_and_self_overlap:
    use: rung_occupancy_01
    expect:
      - ioverlap_real:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{state}"
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:D(0)"
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:D(0)*D(0)"
          approx: 1.0
          abs: 1e-12
