version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinchain-u1 -o lat
    outputs:
      lattice: lat

  infinite_neel2:
    from: lat
    run: mp-construct -l lat -o psi 0.5:-0.5
    outputs:
      state: psi
    certify:
      - expectation_real:
          operator: "lat:Sz(0)"
          approx: 0.5
          abs: 1e-12
      - expectation_real:
          operator: "lat:Sz(1)"
          approx: -0.5
          abs: 1e-12

  infinite_neel2_iapply_identity:
    from: infinite_neel2
    run: mp-iapply "lat:prod_unit(I(0))" psi psi_id
    outputs:
      state: psi_id
    certify:
      - show_product_operator_text:
          operator: "lat:prod_unit(I(0))"
          contains: "Site 0 dimension 1 x 1"
      - show_product_operator_text:
          operator: "lat:prod_unit(I(0))"
          contains: "[I]"
      - ioverlap_real:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12

  infinite_neel2_iapply_identity_fast:
    from: infinite_neel2
    run: mp-iapply --assume-orthogonal "lat:prod_unit(I(0))" psi psi_id_fast
    outputs:
      state: psi_id_fast
    certify:
      - show_product_operator_text:
          operator: "lat:prod_unit(I(0))"
          contains: "Site 0 dimension 1 x 1"
      - ioverlap_real:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12

  infinite_neel2_iapply_sign:
    from: infinite_neel2
    run: mp-iapply "lat:prod_unit(2*Sz(1))" psi psi_sign
    outputs:
      state: psi_sign
    certify:
      - show_product_operator_text:
          operator: "lat:prod_unit(2*Sz(1))"
          contains: "Site 0 dimension 1 x 1"
      - show_product_operator_text:
          operator: "lat:prod_unit(2*Sz(1))"
          contains: "[U]"
      - ioverlap_real:
          psi2: "{parent.state}"
          approx: -1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12

  infinite_neel2_iapply_sign_fast:
    from: infinite_neel2
    run: mp-iapply --assume-orthogonal "lat:prod_unit(2*Sz(1))" psi psi_sign_fast
    outputs:
      state: psi_sign_fast
    certify:
      - show_product_operator_text:
          operator: "lat:prod_unit(2*Sz(1))"
          contains: "Site 0 dimension 1 x 1"
      - show_product_operator_text:
          operator: "lat:prod_unit(2*Sz(1))"
          contains: "[U]"
      - ioverlap_real:
          psi2: "{parent.state}"
          approx: -1.0
          abs: 1e-12
      - ioverlap_imag:
          psi2: "{parent.state}"
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          psi2: "{parent.state}"
          approx: 1.0
          abs: 1e-12

tests:
  iapply_identity_preserves_the_state:
    use:
      psi1: infinite_neel2.state
      psi2: infinite_neel2_iapply_identity.state
    expect:
      - ioverlap_real:
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          approx: 1.0
          abs: 1e-12

  iapply_assume_orthogonal_is_safe_for_the_identity_product_operator:
    use:
      psi1: infinite_neel2_iapply_identity.state
      psi2: infinite_neel2_iapply_identity_fast.state
    expect:
      - ioverlap_real:
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          approx: 1.0
          abs: 1e-12

  iapply_sign_operator_tracks_the_unit_cell_phase:
    use:
      psi1: infinite_neel2.state
      psi2: infinite_neel2_iapply_sign.state
    expect:
      - ioverlap_real:
          approx: -1.0
          abs: 1e-12
      - ioverlap_imag:
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          approx: 1.0
          abs: 1e-12

  iapply_assume_orthogonal_is_safe_for_the_unitary_sign_operator:
    use:
      psi1: infinite_neel2_iapply_sign.state
      psi2: infinite_neel2_iapply_sign_fast.state
    expect:
      - ioverlap_real:
          approx: 1.0
          abs: 1e-12
      - ioverlap_imag:
          approx: 0.0
          abs: 1e-12
      - ioverlap_mag:
          approx: 1.0
          abs: 1e-12
