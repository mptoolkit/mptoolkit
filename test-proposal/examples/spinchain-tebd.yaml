version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: spinchain-u1 -o lat
    outputs:
      lattice: lat

  finite_neel4:
    from: lat
    run: mp-construct -l lat -o psi --finite 0.5:-0.5:0.5:-0.5
    outputs:
      state: psi
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12

  finite_neel4_tebd_identity:
    from: finite_neel4
    run: mp-tebd -w psi -H lat:sum_unit(I(0)) -o out -t 0-0.1i -n 1 -s 1
    outputs:
      state:
        glob: out*
        select: newest
    certify:
      - norm:
          approx: 0.67032004603564
          abs: 1e-12
      - attr_float:
          attribute: Beta
          approx: 0.1
          abs: 1e-12

  infinite_neel2:
    from: lat
    run: mp-construct -l lat -o psi 0.5:-0.5
    outputs:
      state: psi

  infinite_neel2_itebd_identity:
    from: infinite_neel2
    run: mp-itebd -w psi -H lat:sum_unit(I(0)) -o out -t 0-0.1i -n 1 -s 1
    outputs:
      state:
        glob: out*
        select: newest
    certify:
      - attr_float:
          attribute: Beta
          approx: 0.1
          abs: 1e-12
      - attr_text:
          attribute: EvolutionHamiltonian
          equals: "lat:sum_unit(I(0))"

tests:
  tebd_identity_updates_norm_and_beta:
    use: finite_neel4_tebd_identity
    expect:
      - norm:
          approx: 0.67032004603564
          abs: 1e-12
      - attr_text:
          attribute: EvolutionHamiltonian
          equals: "lat:sum_unit(I(0))"

  itebd_identity_updates_beta_and_operator:
    use: infinite_neel2_itebd_identity
    expect:
      - attr_float:
          attribute: Beta
          approx: 0.1
          abs: 1e-12
      - attr_text:
          attribute: EvolutionHamiltonian
          equals: "lat:sum_unit(I(0))"

  imoments_cross_json_reuses_itebd_output:
    use: infinite_neel2_itebd_identity
    expect:
      - imoments_cross_json:
          operator: "lat:sum_unit(Sz(0))"
          json_path: format
          equals: "mptoolkit.imoments-cross.cumulants/v1"
      - imoments_cross_json:
          operator: "lat:sum_unit(Sz(0))"
          json_path: unit_cell_size
          equals: 2
      - imoments_cross_json:
          operator: "lat:sum_unit(Sz(0))"
          json_path: log_amplitude
          approx: -0.4
          abs: 1e-12
      - imoments_cross_json:
          operator: "lat:sum_unit(Sz(0))"
          json_path: cumulants[0].real
          approx: -0.4
          abs: 1e-12

  imoments_cross_json_accepts_explicit_output_bindings:
    use:
      psi1: infinite_neel2_itebd_identity.state
      psi2: infinite_neel2_itebd_identity.state
    expect:
      - imoments_cross_json:
          operator: "lat:sum_unit(Sz(0))"
          json_path: log_amplitude
          approx: -0.4
          abs: 1e-12
