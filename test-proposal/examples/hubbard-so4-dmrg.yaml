version: 0

imports:
  - ../recipes/mptoolkit-probes.yaml

fixtures:
  lat:
    run: hubbard-so4 -o lat
    outputs:
      lattice: lat

  spinon_spinon_scalar:
    from: lat
    run: mp-construct -l lat -o psi --finite "(0,0)spinon(0,0.5)spinon(0,0)"
    outputs:
      state: psi
    certify:
      - norm:
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:P(0)[0]"
          approx: -1.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:P(0)[1]"
          approx: -1.0
          abs: 1e-11

  spinon_holon_2:
    from: lat
    run: mp-construct -l lat -o psi --finite spinon:holon
    outputs:
      state: psi

  ground2_spinon_holon:
    from: spinon_holon_2
    run: mp-dmrg -w psi -H lat:H_t -m 10x4 --flush
    certify:
      - attr_float:
          attribute: LastEnergy
          approx: -1.0
          abs: 1e-11
      - norm:
          approx: 4.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:P(0)[0]"
          approx: 0.0
          abs: 1e-10
      - expectation_real:
          operator: "lat:P(0)[1]"
          approx: 0.0
          abs: 1e-10

tests:
  explicit_nonabelian_construct_can_select_the_scalar_spinon_spinon_sector:
    use: spinon_spinon_scalar
    expect:
      - norm:
          approx: 1.0
          abs: 1e-12
      - expectation_real:
          operator: "lat:P(0)[0]"
          approx: -1.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:P(0)[1]"
          approx: -1.0
          abs: 1e-11

  so4_spinon_holon_ground_state_has_expected_energy_and_reduced_norm:
    use: ground2_spinon_holon
    expect:
      - attr_float:
          attribute: LastEnergy
          approx: -1.0
          abs: 1e-11
      - norm:
          approx: 4.0
          abs: 1e-11
      - expectation_real:
          operator: "lat:P(0)[0]"
          approx: 0.0
          abs: 1e-10
      - expectation_real:
          operator: "lat:P(0)[1]"
          approx: 0.0
          abs: 1e-10

  scalar_spinon_spinon_and_spinon_holon_sectors_are_orthogonal:
    use:
      psi1: spinon_spinon_scalar.state
      psi2: ground2_spinon_holon.state
    expect:
      - overlap_mag:
          approx: 0.0
          abs: 1e-12
