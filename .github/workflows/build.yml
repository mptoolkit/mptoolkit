name: CMake CI

on:
  push:
    branches: [ "main", "cxx20-migration" ]
  pull_request:
    branches: [ "main", "cxx20-migration" ]

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
       sudo apt-get -y update
       sudo apt-get -y install --no-install-recommends \
         libarpack2-dev \
         libboost-program-options-dev \
         libgmp-dev \
         libopenblas-dev \
         python3-yaml
    - name: Configure
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DMPTK_WITH_OPENMP=ON \
          -DMPTK_FORTRAN_COMPLEX_RETURN=auto
    - name: Build CTest targets
      run: cmake --build build --target testexponential --parallel 2
    - name: Run CTest
      working-directory: build
      run: ctest --output-on-failure
    - name: Build and run integration suites
      run: cmake --build build --target test-integration --parallel 2
